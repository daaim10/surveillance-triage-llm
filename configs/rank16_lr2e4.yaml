# Model
model_name: "unsloth/Meta-Llama-3.1-8B"
max_seq_length: 2048
load_in_4bit: true

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
num_train_epochs: 3
learning_rate: 2e-4
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 10
weight_decay: 0.01
lr_scheduler_type: "linear"
seed: 42

# Data
train_data_path: "data/train.json"
val_data_path: "data/val.json"

# Output
output_dir: "outputs/rank16_lr2e4_ep3"
adapter_save_path: "adapters/rank16_lr2e4_ep3"

# W&B
wandb_project: "surveillance-triage-finetune"
wandb_run_name: "rank16-lr2e4-ep3"